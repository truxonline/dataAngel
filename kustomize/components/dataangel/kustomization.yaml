apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

metadata:
  name: data-guard

commonLabels:
  dataangel.io/enabled: "true"

patches:
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/initContainers/-
        value:
          name: dataangel
          restartPolicy: Always
          image: charchess/dataangel:0.3.1
          imagePullPolicy: IfNotPresent
          env:
            - name: DATA_GUARD_BUCKET
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['dataangel.io/bucket']
            - name: DATA_GUARD_SQLITE_PATHS
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['dataangel.io/sqlite-paths']
            - name: DATA_GUARD_FS_PATHS
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['dataangel.io/fs-paths']
            - name: DATA_GUARD_S3_ENDPOINT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['dataangel.io/s3-endpoint']
            - name: DATA_GUARD_DEPLOYMENT_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['dataangel.io/deployment-name']
            - name: DATA_GUARD_LOCK_TTL
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['dataangel.io/lock-ttl']
            - name: DATA_GUARD_LOCK_ENABLED
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['dataangel.io/lock-enabled']
            - name: DATA_GUARD_RCLONE_INTERVAL
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['dataangel.io/rclone-interval']
            - name: DATA_GUARD_METRICS_PORT
              value: "9090"
            - name: DATA_GUARD_METRICS_ENABLED
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['dataangel.io/metrics-enabled']
            - name: DATA_GUARD_FULL_LOGS
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['dataangel.io/full-logs']
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: AWS_REGION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['dataangel.io/aws-region']
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: dataangel-credentials
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: dataangel-credentials
                  key: secret-key
          command: ["./dataangel"]
          ports:
            - containerPort: 9090
              name: metrics
              protocol: TCP
          startupProbe:
            httpGet:
              path: /ready
              port: 9090
            periodSeconds: 2
            failureThreshold: 150
            timeoutSeconds: 1
          readinessProbe:
            httpGet:
              path: /ready
              port: 9090
            initialDelaySeconds: 0
            periodSeconds: 2
            failureThreshold: 150
          volumeMounts:
            - name: data
              mountPath: /data
              readOnly: false

images:
  - name: charchess/dataangel
    newTag: 0.3.1
