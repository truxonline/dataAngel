apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: data-guard-sidecar
  labels:
    release: prometheus
    app.kubernetes.io/name: data-guard
    app.kubernetes.io/component: monitoring
spec:
  selector:
    matchLabels:
      data-guard.io/enabled: "true"
  
  namespaceSelector:
    any: true
  
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
