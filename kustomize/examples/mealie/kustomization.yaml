apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Kustomization

namespace: mealie

components:
  - ../../components/data-guard

resources:
  - deployment.yaml

patches:
  - target:
      kind: Deployment
      name: mealie
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mealie
      spec:
        template:
          spec:
            initContainers:
              - name: dataangel
                volumeMounts:
                  - name: data
                    mountPath: /app/data
                env:
                  - name: AWS_ACCESS_KEY_ID
                    valueFrom:
                      secretKeyRef:
                        name: mealie-infisical-secret
                  - name: AWS_SECRET_ACCESS_KEY
                    valueFrom:
                      secretKeyRef:
                        name: mealie-infisical-secret
