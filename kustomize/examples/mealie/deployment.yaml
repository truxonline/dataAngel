apiVersion: apps/v1
kind: Deployment
metadata:
  name: mealie
  namespace: mealie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mealie
  template:
    metadata:
      labels:
        app: mealie
      annotations:
        dataangel.io/bucket: "vixens-backups"
        dataangel.io/sqlite-paths: "/app/data/mealie.db"
        dataangel.io/fs-paths: "/app/data/recipes,/app/data/user-files"
        dataangel.io/s3-endpoint: "http://minio.minio.svc.cluster.local:9000"
        dataangel.io/deployment-name: "mealie"
        dataangel.io/lock-ttl: "60s"
        dataangel.io/rclone-interval: "300s"
        dataangel.io/metrics-enabled: "true"
    spec:
      # CRITIQUE: runAsUser doit matcher l'UID de l'app Mealie (911)
      # pour que init/sidecar puissent accéder aux fichiers
      securityContext:
        runAsUser: 911
        runAsGroup: 911
        fsGroup: 911
        runAsNonRoot: true
      
      containers:
      - name: mealie
        image: ghcr.io/mealie-recipes/mealie:latest
        ports:
        - containerPort: 9000
          name: http
        env:
        - name: TZ
          value: "Europe/Paris"
        - name: BASE_URL
          value: "https://mealie.example.com"
        volumeMounts:
        - name: data
          mountPath: /app/data
      
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: mealie-data
