apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: home-assistant
  template:
    metadata:
      labels:
        app: home-assistant
      annotations:
        data-guard.io/bucket: "vixens-backups"
        data-guard.io/sqlite-paths: "/config/home-assistant_v2.db"
        data-guard.io/fs-paths: "/config"
        data-guard.io/s3-endpoint: "http://minio.minio.svc.cluster.local:9000"
        data-guard.io/deployment-name: "home-assistant"
        data-guard.io/lock-ttl: "60s"
        data-guard.io/rclone-interval: "300s"
        data-guard.io/metrics-enabled: "true"
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      
      # CRITIQUE: Home Assistant nécessite root pour hardware access
      # Init/sidecar tournent aussi en root pour accéder aux fichiers
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
        runAsNonRoot: false
      
      containers:
      - name: home-assistant
        image: ghcr.io/home-assistant/home-assistant:stable
        ports:
        - containerPort: 8123
          name: http
        env:
        - name: TZ
          value: "Europe/Paris"
        securityContext:
          privileged: true
        volumeMounts:
        - name: config
          mountPath: /config
      
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: home-assistant-config
