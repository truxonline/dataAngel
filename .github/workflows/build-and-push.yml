name: Build and Push Docker Images

on:
  push:
    branches: [ main, master ]
    paths:
      - 'cmd/init/**'
      - 'internal/restore/**'
      - 'pkg/s3/**'
      - 'cmd/data-guard-cli/**'
      - 'cmd/cli/**'
      - 'docker/**'
      - '.github/workflows/build-and-push.yml'
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  IMAGE_INIT: data-guard-init
  IMAGE_CLI: data-guard-cli

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for init container
      id: meta-init
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_INIT }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push init container
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/init-container.Dockerfile
        push: true
        tags: ${{ steps.meta-init.outputs.tags }}
        labels: ${{ steps.meta-init.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Extract metadata for CLI
      id: meta-cli
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_CLI }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push CLI
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/cli.Dockerfile
        push: true
        tags: ${{ steps.meta-cli.outputs.tags }}
        labels: ${{ steps.meta-cli.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  test:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Run tests
      run: |
        cd internal/restore && go test -v ./...
        cd ../cmd/init && go test -v ./...
        cd ../cmd/cli && go test -v ./...
