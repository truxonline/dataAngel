apiVersion: v1
kind: Namespace
metadata:
  name: dataangel-test
---
apiVersion: v1
kind: Secret
metadata:
  name: s3-credentials
  namespace: dataangel-test
type: Opaque
stringData:
  access-key: "minioadmin"
  secret-key: "minioadmin"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: test-app-script
  namespace: dataangel-test
data:
  test-app.sh: |
    #!/bin/sh
    echo "Test app started at $(date)"
    echo "Hostname: $(hostname)"
    
    DB_PATH="/data/test.db"
    sqlite3 "$DB_PATH" "CREATE TABLE IF NOT EXISTS writes (id INTEGER PRIMARY KEY, hostname TEXT, timestamp TEXT);"
    
    while true; do
      sqlite3 "$DB_PATH" "INSERT INTO writes (hostname, timestamp) VALUES ('$(hostname)', '$(date -Iseconds)');"
      echo "$(date -Iseconds) [$(hostname)] Wrote to DB"
      sleep 5
    done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-app
  namespace: dataangel-test
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: test-app
  template:
    metadata:
      labels:
        app: test-app
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
      
      initContainers:
      - name: dataangel
        image: charchess/dataangel:0.3.1
        restartPolicy: Always
        command: ["./dataangel"]
        env:
        - name: DATA_GUARD_BUCKET
          value: "test-bucket"
        - name: DATA_GUARD_SQLITE_PATHS
          value: "/data/test.db"
        - name: DATA_GUARD_S3_ENDPOINT
          value: "http://minio.minio.svc.cluster.local:9000"
        - name: DATA_GUARD_DEPLOYMENT_NAME
          value: "test-app"
        - name: DATA_GUARD_LOCK_TTL
          value: "60s"
        - name: DATA_GUARD_METRICS_ENABLED
          value: "true"
        - name: DATA_GUARD_FULL_LOGS
          value: "true"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: s3-credentials
              key: access-key
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: s3-credentials
              key: secret-key
        ports:
        - containerPort: 9090
          name: metrics
        readinessProbe:
          httpGet:
            path: /ready
            port: 9090
          initialDelaySeconds: 0
          periodSeconds: 2
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /data
      
      containers:
      - name: app
        image: alpine:3.19
        command: ["/bin/sh", "/scripts/test-app.sh"]
        volumeMounts:
        - name: data
          mountPath: /data
        - name: scripts
          mountPath: /scripts
      
      volumes:
      - name: data
        emptyDir: {}
      - name: scripts
        configMap:
          name: test-app-script
          defaultMode: 0755
